appId: com.whatyterm.app
productName: WhatyTerm
copyright: Copyright © 2024

directories:
  output: release
  buildResources: build

files:
  - electron/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}"
  - "!server/**/*"
  - "!dist/**/*"

# 服务端作为额外资源，不打入 asar
extraResources:
  # 应用图标（托盘、任务栏运行时使用）
  - from: build/icon.ico
    to: icon.ico
  - from: build/icon.icns
    to: icon.icns
  # 服务器代码
  - from: server
    to: server
  # 前端构建产物（Express 需要直接访问文件系统）
  - from: dist
    to: dist
  # 完整打包 node_modules（排除开发工具和缓存）
  - from: node_modules
    to: node_modules
    filter:
      - "**/*"
      - "!.cache/**"
      - "!.bin/**"
      # ── 构建工具（绝对不应打入生产包）──
      - "!electron/**"
      - "!electron-builder/**"
      - "!app-builder-bin/**"
      - "!app-builder-lib/**"
      - "!electron-winstaller/**"
      - "!dmg-builder/**"
      - "!7zip-bin/**"
      - "!builder-util/**"
      - "!builder-util-runtime/**"
      - "!electron-publish/**"
      # ── 前端构建工具 ──
      - "!vite/**"
      - "!@vitejs/**"
      - "!esbuild/**"
      - "!@esbuild/**"
      - "!rollup/**"
      - "!postcss/**"
      - "!tailwindcss/**"
      - "!autoprefixer/**"
      - "!lightningcss*/**"
      - "!@lightningcss/**"
      # ── 代码工具 ──
      - "!typescript/**"
      - "!eslint/**"
      - "!prettier/**"
      - "!javascript-obfuscator/**"
      - "!@babel/**"
      # ── 未使用的 AI 推理引擎 ──
      - "!onnxruntime-node/**"
      - "!onnxruntime-web/**"
      - "!@huggingface/**"
      # ── 其他确认未使用的包 ──
      - "!libphonenumber-js/**"
      # ── node-pty 跨平台预编译二进制（由 afterPack 钩子按目标平台清理）──
      # ── better-sqlite3 编译中间产物（只需 Release/*.node）──
      - "!better-sqlite3/build/deps/**"
      - "!better-sqlite3/build/*.mk"
      - "!better-sqlite3/build/Makefile"
      - "!better-sqlite3/build/gyp-mac-tool"
      - "!better-sqlite3/build/binding.Makefile"
      - "!better-sqlite3/build/config.gypi"

asar: true
# 原生模块配置
# 注意：跨平台构建需要在目标平台上运行 electron-rebuild
# 本地构建使用 npmRebuild: false，CI 构建前会先运行 electron-rebuild
npmRebuild: false
nodeGypRebuild: false
afterPack: scripts/rebuild-native.cjs

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  identity: "Beijing Youxun Online Technolog Co., Ltd. (75JRAR2YKZ)"
  notarize: true
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  signAndEditExecutable: true

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  deleteAppDataOnUninstall: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: WhatyTerm
  include: build/installer.nsh
  guid: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
  # 禁用默认的应用运行检测，由 installer.nsh 中的 customCheckAppRunning 处理
  runAfterFinish: true

linux:
  icon: build/icons
  category: Development
  target:
    - target: AppImage
      arch:
        - x64

# 自动更新配置
publish:
  provider: generic
  url: https://term.whaty.org/releases
  channel: latest
